<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Team - Acesso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://media.discordapp.net/attachments/1480331574154236148/1481342442665148516/a4c59fbd349f91575cc0863a5e77f131.gif?ex=69b59a28&is=69b448a8&hm=4e25e06155b9dee6f7088008fb9a7908f456d26ced66fa89c73a8e08aa1a7611&=&width=440&height=352') center/cover fixed;
            z-index: -2;
            opacity: 0.5;
        }
        
        #auth-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        .auth-box {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #ff0000;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .welcome-message {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .welcome-message h1 {
            font-size: 42px;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 10px;
        }
        
        .welcome-message p {
            font-size: 16px;
            color: #fff;
            opacity: 0.9;
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #ff0000;
            gap: 10px;
        }
        
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px 10px 0 0;
            background: rgba(255, 0, 0, 0.1);
        }
        
        .auth-tab:hover {
            background: rgba(255, 0, 0, 0.3);
        }
        
        .auth-tab.active {
            background: #ff0000;
            color: #000;
            border-bottom: 3px solid #fff;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .auth-form h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }
        
        .auth-form input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #ff0000;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        
        .auth-form input:focus {
            outline: none;
            border-color: #ff4444;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        
        .auth-form button {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid #ff0000;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        
        .auth-form button:hover {
            background: #ff0000;
            color: #000;
            transform: translateY(-2px);
        }
        
        .error-message {
            display: none;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff0000;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #ff0000;
            font-size: 14px;
        }
        
        #loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: #ff0000;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="loading">CARREGANDO...</div>

    <div id="auth-page">
        <div class="auth-container">
            <div class="auth-box">
                <div class="welcome-message">
                    <h1>🩸 BLOOD TEAM 🩸</h1>
                    <p>Sistema de Acesso</p>
                </div>
                
                <div class="auth-tabs">
                    <div class="auth-tab active" onclick="mudarAba('login')">ENTRAR</div>
                    <div class="auth-tab" onclick="mudarAba('register')">REGISTRAR</div>
                </div>
                
                <div id="error-message" class="error-message"></div>
                
                <div id="login-form" class="auth-form active">
                    <h2>🔐 ENTRAR</h2>
                    <input type="text" id="login-username" placeholder="Usuário">
                    <input type="password" id="login-password" placeholder="Senha">
                    <button onclick="fazerLogin()">ENTRAR</button>
                </div>
                
                <div id="register-form" class="auth-form">
                    <h2>📝 REGISTRAR</h2>
                    <input type="text" id="register-username" placeholder="Usuário">
                    <input type="password" id="register-password" placeholder="Senha">
                    <input type="password" id="register-confirm" placeholder="Confirmar senha">
                    <button onclick="fazerRegistro()">CRIAR CONTA</button>
                </div>
                
                <div class="auth-footer">
                    By: Unknownijs
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const API_KEY = 'bloodteam2025_secreta';
        
        function mostrarLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }
        
        function mudarAba(aba) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (aba === 'login') {
                document.querySelector('.auth-tab').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }
        
        async function fazerLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            
            if (!username || !password) {
                alert('Preencha todos os campos!');
                return;
            }
            
            mostrarLoading(true);
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('blood_usuario', JSON.stringify(data.usuario));
                    window.location.href = 'chat.html';
                } else {
                    alert('Usuário ou senha inválidos!');
                }
            } catch (error) {
                alert('Erro de conexão. API está rodando?');
            } finally {
                mostrarLoading(false);
            }
        }
        
        async function fazerRegistro() {
            const username = document.getElementById('register-username').value.trim();
            const password = document.getElementById('register-password').value.trim();
            const confirm = document.getElementById('register-confirm').value.trim();
            
            if (!username || !password || !confirm) {
                alert('Preencha todos os campos!');
                return;
            }
            
            if (password !== confirm) {
                alert('As senhas não coincidem!');
                return;
            }
            
            mostrarLoading(true);
            
            try {
                const response = await fetch(`${API_URL}/registrar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('blood_usuario', JSON.stringify(data.usuario));
                    window.location.href = 'chat.html';
                } else {
                    alert('Erro: ' + data.error);
                }
            } catch (error) {
                alert('Erro de conexão. API está rodando?');
            } finally {
                mostrarLoading(false);
            }
        }
        
        if (localStorage.getItem('blood_usuario')) {
            window.location.href = 'chat.html';
        }
    </script>
</body>
</html>
