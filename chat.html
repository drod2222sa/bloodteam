<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Team - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: -1;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://media.discordapp.net/attachments/1480331574154236148/1481342442665148516/a4c59fbd349f91575cc0863a5e77f131.gif?ex=69b59a28&is=69b448a8&hm=4e25e06155b9dee6f7088008fb9a7908f456d26ced66fa89c73a8e08aa1a7611&=&width=440&height=352') center/cover fixed;
            z-index: -2;
            opacity: 0.5;
        }
        
        #chat-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
        }
        
        .chat-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        
        .chat-sidebar-left {
            width: 250px;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            border-right: 2px solid #ff0000;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #ff0000;
            text-align: center;
            color: #fff;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 5px;
            background: rgba(255,0,0,0.1);
            border-radius: 5px;
            color: #fff;
        }
        
        .user-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            margin-right: 10px;
        }
        
        .logout-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid #ff0000;
            color: #fff;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.7);
        }
        
        .chat-tabs {
            display: flex;
            padding: 10px;
            gap: 5px;
            border-bottom: 2px solid #ff0000;
        }
        
        .chat-tab {
            padding: 10px 20px;
            background: rgba(255,0,0,0.1);
            border: 1px solid #ff0000;
            color: #fff;
            cursor: pointer;
        }
        
        .chat-tab.active {
            background: #ff0000;
            color: #000;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .message {
            margin-bottom: 15px;
            max-width: 70%;
        }
        
        .message.sent {
            align-self: flex-end;
        }
        
        .message.received {
            align-self: flex-start;
        }
        
        .message-content {
            padding: 10px 15px;
            border-radius: 10px;
        }
        
        .message.sent .message-content {
            background: #ff0000;
            color: #fff;
        }
        
        .message.received .message-content {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .message-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 11px;
        }
        
        .message-author {
            color: #ff0000;
            font-weight: bold;
        }
        
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #ff0000;
            display: flex;
            gap: 10px;
        }
        
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #ff0000;
            border-radius: 5px;
            color: #fff;
        }
        
        .chat-input-area button {
            padding: 12px 25px;
            background: #ff0000;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
        }
        
        .chat-sidebar-right {
            width: 250px;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            border-left: 2px solid #ff0000;
            color: #fff;
            padding: 20px;
        }
        
        .info-title {
            color: #ff0000;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .regras-list {
            list-style: none;
            margin-top: 10px;
        }
        
        .regras-list li {
            color: #fff;
            font-size: 12px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,0,0,0.2);
        }
        
        .regras-list li:before {
            content: "•";
            color: #ff0000;
            margin-right: 5px;
        }
        
        #loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: #ff0000;
            font-size: 24px;
        }
        
        .admin-badge {
            background: gold;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div id="loading">CARREGANDO...</div>

    <div id="chat-page">
        <div class="chat-container">
            <div class="chat-sidebar-left">
                <div class="sidebar-header">
                    <h3>👥 USUÁRIOS</h3>
                    <p id="online-count">0 online</p>
                </div>
                <div class="users-list" id="users-list"></div>
                <button class="logout-btn" onclick="fazerLogout()">SAIR</button>
            </div>
            
            <div class="chat-main">
                <div class="chat-tabs">
                    <div class="chat-tab active" onclick="mudarAba('us')">🇺🇸 US</div>
                    <div class="chat-tab" onclick="mudarAba('br')">🇧🇷 BR</div>
                </div>
                
                <div class="chat-messages" id="chat-messages"></div>
                
                <div class="chat-input-area">
                    <input type="text" id="message-input" placeholder="Digite sua mensagem...">
                    <button onclick="enviarMensagem()">Enviar</button>
                </div>
            </div>
            
            <div class="chat-sidebar-right">
                <div class="info-title">BEM-VINDO</div>
                <p id="welcome-user">Carregando...</p>
                
                <div class="info-title" style="margin-top: 20px;">REGRAS</div>
                <ul class="regras-list">
                    <li>🇺🇸 English in US chat</li>
                    <li>🇧🇷 Português no BR chat</li>
                    <li>Respeito acima de tudo</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const API_KEY = 'bloodteam2025_secreta';
        const ADMIN_USER = 'unknownijs';
        
        const usuarioAtual = JSON.parse(localStorage.getItem('blood_usuario'));
        let abaAtual = 'us';
        let mensagens = [];
        
        if (!usuarioAtual) {
            window.location.href = 'index.html';
        }
        
        function mostrarLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }
        
        function mudarAba(aba) {
            document.querySelectorAll('.chat-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            abaAtual = aba;
            carregarMensagens();
        }
        
        async function carregarMensagens() {
            try {
                const response = await fetch(`${API_URL}/mensagens/${abaAtual}`);
                mensagens = await response.json();
                
                const container = document.getElementById('chat-messages');
                container.innerHTML = '';
                
                mensagens.forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.autor === usuarioAtual.username ? 'sent' : 'received'}`;
                    
                    const hora = new Date(msg.data).toLocaleTimeString('pt-BR');
                    
                    messageDiv.innerHTML = `
                        <div class="message-content">
                            <div class="message-info">
                                <span class="message-author">${msg.autor}${msg.autor === ADMIN_USER ? ' 👑' : ''}</span>
                                <span>${hora}</span>
                            </div>
                            <div>${msg.texto}</div>
                        </div>
                    `;
                    
                    container.appendChild(messageDiv);
                });
                
                container.scrollTop = container.scrollHeight;
            } catch (error) {
                console.error('Erro ao carregar mensagens:', error);
            }
        }
        
        async function enviarMensagem() {
            const input = document.getElementById('message-input');
            const texto = input.value.trim();
            
            if (!texto) return;
            
            mostrarLoading(true);
            
            try {
                const response = await fetch(`${API_URL}/enviar`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({
                        autor: usuarioAtual.username,
                        texto: texto,
                        canal: abaAtual
                    })
                });
                
                if (response.ok) {
                    input.value = '';
                    await carregarMensagens();
                }
            } catch (error) {
                alert('Erro ao enviar mensagem');
            } finally {
                mostrarLoading(false);
            }
        }
        
        async function carregarUsuarios() {
            try {
                const response = await fetch(`${API_URL}/usuarios`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                
                const usuarios = await response.json();
                
                document.getElementById('online-count').textContent = `${usuarios.length} online`;
                document.getElementById('welcome-user').textContent = `${usuarioAtual.username} (${usuarioAtual.cargo})`;
                
                const lista = document.getElementById('users-list');
                lista.innerHTML = '';
                
                usuarios.forEach(user => {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `
                        <span class="user-status"></span>
                        <span>${user.username}${user.username === ADMIN_USER ? ' 👑' : ''}</span>
                    `;
                    lista.appendChild(userDiv);
                });
            } catch (error) {
                console.error('Erro ao carregar usuários:', error);
            }
        }
        
        function fazerLogout() {
            localStorage.removeItem('blood_usuario');
            window.location.href = 'index.html';
        }
        
        // Atualização automática
        setInterval(carregarMensagens, 3000);
        
        window.onload = () => {
            carregarMensagens();
            carregarUsuarios();
        };
    </script>
</body>
</html>
